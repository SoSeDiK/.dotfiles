# Only display the OSD on the currently focused monitor
$osdclient = swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')"

# Laptop multimedia keys for volume
bindle = , XF86AudioRaiseVolume, exec, pamixer --increase 5 && sleep 0.05 && $osdclient --output-volume +0
bindle = , XF86AudioLowerVolume, exec, pamixer --decrease 5 && sleep 0.05 &&  $osdclient --output-volume +0
bindeld = , XF86AudioMute, Mute, exec, $osdclient --output-volume mute-toggle

# Mute microphone
bind = , XF86AudioMicMute, exec, $osdclient --input-volume mute-toggle

# Laptop multimedia keys for brightness
bindled = , XF86MonBrightnessUp, Brightness up, exec, brightnessctl -d $(ls -w1 /sys/class/backlight | head -1) -e4 -n2 set +5% && sleep 0.05 && $osdclient --brightness +0
bindled = , XF86MonBrightnessDown, Brightness down, exec, brightnessctl -d $(ls -w1 /sys/class/backlight | head -1) -e4 -n2 set 5%- && sleep 0.05 && $osdclient --brightness +0

# Keyboard Backlight Brightness
bindle = , XF86KbdBrightnessUp, exec, brightnessctl -d $(ls -w1 /sys/class/leds | grep kbd | head -1) set +5%
bindle = , XF86KbdBrightnessDown, exec, brightnessctl -d $(ls -w1 /sys/class/leds | grep kbd | head -1) set 5%-

# Precise 1% adjustments with Alt modifier (volume)
bindeld = ALT, XF86AudioRaiseVolume, Volume up precise, exec, $osdclient --output-volume +1
bindeld = ALT, XF86AudioLowerVolume, Volume down precise, exec, $osdclient --output-volume -1

# Precise 1% adjustments with Alt modifier (brightness)
bindled = ALT, XF86MonBrightnessUp, Brightness up (precise), exec, $osdclient --brightness +1
bindled = ALT, XF86MonBrightnessDown, Brightness down (precise), exec, $osdclient --brightness -1

# Audio - Controls (Play/Pause, Previous, Next)
bindld = , XF86AudioNext, Next track, exec, $osdclient --playerctl next
bindld = , XF86AudioPause, Pause, exec, $osdclient --playerctl play-pause
bindld = , XF86AudioPlay, Play, exec, $osdclient --playerctl play-pause
bindld = , XF86AudioPrev, Previous track, exec, $osdclient --playerctl previous
