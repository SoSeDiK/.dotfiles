# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# Ignore maximize requests from apps
windowrule = suppress_event maximize, match:class .*

# "Smart gaps" / "No gaps when only"
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsin:0, gapsout:0, border:0
windowrule = border_size 0, match:float 0, match:workspace w[tv1]
windowrule = rounding 0, match:float 0, match:workspace w[tv1]
windowrule = border_size 0, match:float 0, match:workspace f[1]
windowrule = rounding 0, match:float 0, match:workspace f[1]

# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# "Hyprland issue detector"
windowrule = border_color rgba(f44336ff), match:xwayland 1

# Pinned floating windows
windowrule = border_color rgba(ffffffff) rgba(ffffff55), match:float 1, match:pin 1

# Clipboard
windowrule = float on, match:class ^((com\.github\.hluk\.)?copyq)$
windowrule = center on, match:class ^((com\.github\.hluk\.)?copyq)$

