# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# Ignore maximize requests from apps
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# "Hyprland issue detector" — Highlight XWayland windows red
windowrule = border_color rgba(f44336ff), match:xwayland 1

# "Smart gaps" / "No gaps when only"
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsin:0, gapsout:0, border:0
windowrule = border_size 0, match:float 0, match:workspace w[tv1]
windowrule = rounding 0, match:float 0, match:workspace w[tv1]
windowrule = border_size 0, match:float 0, match:workspace f[1]
windowrule = rounding 0, match:float 0, match:workspace f[1]

# Apply opacity by default, apps can opt out with -default-opacity tag
windowrule = tag +default-opacity, match:class .*
windowrule = opacity 0.97 0.9, match:tag default-opacity

# Pinned floating windows
windowrule = border_color rgba(ffffffff) rgba(ffffff55), match:float 1, match:pin 1

# Clipboard
windowrule = float on, match:class ^((com\.github\.hluk\.)?copyq)$
windowrule = center on, match:class ^((com\.github\.hluk\.)?copyq)$

# Fullscreen apps
windowrule = fullscreen on, match:class ^(Minecraft)(.*)$

# Emoji picker
windowrule = tag +floating-window, pin on, opacity 0.9 0.8, match:class ^(it\.mijorus\.smile)$

# Spotify
layerrule = blur on, match:namespace Spotify
windowrule = opacity 0.8 override, match:initial_title (Spotify)
windowrule = idle_inhibit focus, match:initial_title (Spotify)
## ESC to exit fullscreen popup
windowrule = float on, match:class ^$, match:workspace special:music
windowrule = no_initial_focus on, match:class ^$, match:workspace special:music
windowrule = size 380 60, match:class ^$, match:workspace special:music
windowrule = move 0 0, match:class ^$, match:workspace special:music

# Discord
$discordApp = "equibop"
layerrule = blur on, match:namespace $discordApp
windowrule = opacity 0.9 override 0.8 override, match:class ^(equibop)$

# Telegram
layerrule = blur on, match:namespace org.telegram.desktop
windowrule = opacity 0.9 override 0.8 override, match:class (org.telegram.desktop)

# Satty
windowrule = float on, match:class (com.gabm.satty)
windowrule = fullscreen on, match:class (com.gabm.satty)

# Kitty
layerrule = blur on, match:namespace kitty
windowrule = opacity 0.85 0.8, match:class (kitty)

# File manager
layerrule = blur on, match:namespace org.gnome.Nautilus
windowrule = opacity 0.95 override 0.9 override, match:class (org.gnome.Nautilus)

# AGS
layerrule = blur on, match:namespace ags

# Rofi
layerrule = blur on, match:namespace rofi
layerrule = dim_around on, match:namespace rofi

# Transparency
windowrule = opacity 0.85 override 0.9 override, match:title (Qalculate!)

# JetBrains
windowrule = stay_focused on, match:class ^(jetbrains-.*)$, match:title ^$, match:float 1
windowrule = float on, match:class ^(jetbrains-.*), match:title ^(win.*)
windowrule = no_initial_focus on, match:class ^(jetbrains-.*)$

# Prevent screen locking if there's a fullscreen window 
windowrule = idle_inhibit fullscreen, match:fullscreen 1
