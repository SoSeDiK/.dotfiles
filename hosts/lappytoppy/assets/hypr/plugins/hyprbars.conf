plugin:hyprbars {
    bar_height = 25
    bar_color = rgb(11111b)
    col.text = rgb(cdd6f4)

    bar_precedence_over_border = true

    hyprbars-button = rgb(5ECBE1), 16, 󱞩, hyprctl dispatch togglefloating
    # hyprbars-button = rgb(a6e3a1), 16, 󰊓, hyprctl dispatch fullscreen 1

    on_double_click = hyprctl dispatch killactive
    # on_double_click = hyprctl dispatch fullscreen 1
}

windowrule = hyprbars:no_bar on, match:class .*

