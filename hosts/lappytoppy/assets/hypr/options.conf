env = HYPRCURSOR_THEME, Bibata-Modern-Ice-Hyprcursor
env = HYPRCURSOR_SIZE, 24

# TODO: remove, https://github.com/NixOS/nixpkgs/issues/353990
env = GSK_RENDERER, ngl

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#cursor
cursor {
    # hotspot_padding = 0
    hide_on_key_press = true
    warp_on_change_workspace = 1
}

binds {
    scroll_event_delay = 0
    hide_special_on_workspace_change = true
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 2
    gaps_out = 0, 0, 0, 0 # -> top, right, bottom, left
    border_size = 2

    resize_on_border = false
    no_focus_fallback = true

    # layout = scrolling
    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    snap {
        enabled = true
        window_gap = 25
        monitor_gap = 10
        respect_gaps = true
    }
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 0
    rounding_power = 4

    blur {
        enabled = true
        size = 2
        passes = 2
        special = true
        brightness = 0.60
        contrast = 0.75
    }

    # Shadow
    shadow {
        enabled = true
        range = 2
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # Dim
    dim_inactive = false
    dim_strength = 0.1
    dim_special = 0.05

    # Shaders
    # screen_shader = ~/.dotfiles/assets/hypr/shaders/crt.frag
}

animations {
    enabled = true
    # See https://wiki.hyprland.org/Configuring/Animations/ for more

    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    #           NAME,               ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,             1,     10,    default
    animation = border,             1,     5.39,  easeOutQuint

    animation = windows,            1,     5,     easeOutQuint
    animation = windowsIn,          1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,         1,     3.5,   linear,       popin 87%

    animation = fadeIn,             1,     1.73,  almostLinear
    animation = fadeOut,            1,     1.46,  almostLinear
    animation = fade,               1,     3.03,  quick

    animation = layers,             1,     3.81,  easeOutQuint
    animation = layersIn,           1,     4,     easeOutQuint, fade
    animation = layersOut,          1,     1.5,   linear,       fade

    animation = fadeLayersIn,       1,     1.79,  almostLinear
    animation = fadeLayersOut,      1,     1.39,  almostLinear

    animation = workspaces,         0
    animation = specialWorkspace,   0

    animation = zoomFactor,         1,     7,     quick
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = true
    smart_split = true
    precise_mouse_move = true
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_status = "master"
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    disable_autoreload = false

    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true

    middle_click_paste = true
    enable_anr_dialog = false

    enable_swallow = false
    swallow_regex = ^(kitty)$
}

ecosystem {
    no_donation_nag = true
    no_update_news = true
}

debug {
    # error_position = 0
    # disable_logs = false
    # damage_tracking = false
}
